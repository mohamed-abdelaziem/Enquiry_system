<div class="min-h-screen flex items-center justify-center bg-linear-to-r from-blue-600 to-indigo-700 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-3">
        <i class="fas fa-user-shield text-4xl text-blue-600"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
      <p class="text-gray-500 text-sm">Login to your account</p>
    </div>

    <!-- Form -->
    <form (submit)="onLogin()" [formGroup]="loginForm" class="space-y-6">

      <!-- Username -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700">
          Username
        </label>

        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
            <i class="fas fa-user"></i>
          </span>

          <input type="text"
                 placeholder="Enter your username"
                 formControlName="userName"
                 class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition" />
        </div>
      
       
    @if (loginForm.get('userName')?.errors && loginForm.get('userName')?.touched) {
      <div class="p-4 mt-2 text-sm text-fg-danger-strong rounded-base bg-danger-soft" role="alert">
  <span class="font-medium">userName Is Required</span>
</div>
    }
    </div>


     

      <!-- Password -->
      <div>
        <label class="block mb-2 text-sm font-medium text-gray-700">
          Password
        </label>

        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
            <i class="fas fa-lock"></i>
          </span>

          <input id="passwordInput"
                 type="password"
                 formControlName="password"
                 placeholder="Enter your password"
                 class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition" />

          <!-- Show / Hide -->
          <span (click)="togglePassword()"
                class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-400 hover:text-gray-600">
            <i id="toggleIcon" class="fas fa-eye"></i>
          </span>
       
        </div>
       @if (loginForm.get('password')?.errors && loginForm.get('password')?.touched) {
      <div class="p-4 mt-2 text-sm text-fg-danger-strong rounded-base bg-danger-soft" role="alert">
  <span class="font-medium">password Is Required</span>
</div>
    }  
    </div>

      
      <!-- Submit -->
      <button type="submit"
      [disabled]="loginForm.invalid || loginLoading()"
              class="w-full cursor-pointer bg-blue-600 text-white py-2.5 rounded font-medium hover:bg-blue-700 transition duration-300 shadow-md hover:shadow-lg">
        
        @if (loginLoading()) {
            Loading...
        }@else {
            <i class="fas fa-sign-in-alt mr-2"></i>
            Login
        }
      </button>

    </form>

  </div>

</div>
